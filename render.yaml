services:
  - type: web
    name: kosis-analysis-mcp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn kosis_http_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: KOSIS_API_KEY
        sync: false
      - key: KOSIS_MCP_AUTH_TOKEN
        sync: false
      - key: KOSIS_MCP_META_CACHE_TTL
        value: "3600"
      - key: KOSIS_MCP_QUERY_TABLE_MAX_FANOUT
        value: "80"
      - key: KOSIS_MCP_QUERY_TABLE_CONCURRENCY
        value: "8"
      - key: KOSIS_MCP_QUERY_TABLE_CALL_TIMEOUT
        value: "15"
